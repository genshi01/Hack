<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DODS MASTER · Cyber Load Tester</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0b0d;
            --card-bg: #14161b;
            --input-bg: #1c1f26;
            --accent-red: #ff3b30;
            --accent-cyan: #00f2ff;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border: #2c2e33;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Container mô phỏng màn hình điện thoại hoặc dashboard tập trung */
        .phone-frame {
            width: 100%;
            max-width: 420px;
            background: var(--bg-dark);
            padding: 20px;
            position: relative;
        }

        /* Header Logo */
        .app-header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 10px;
        }
        .app-header .logo {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--text-main);
        }
        .app-header .logo span { color: var(--accent-red); }

        /* Section Titles */
        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Panel Config */
        .config-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 18px;
        }
        .input-group:last-child { margin-bottom: 0; }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            border-color: var(--accent-cyan);
        }

        /* Slider mô phỏng RPS trong ảnh */
        .slider-container {
            margin-top: 10px;
        }
        input[type=range] {
            width: 100%;
            accent-color: var(--accent-red);
            margin: 10px 0;
        }

        /* Status & Graph Panel */
        .status-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .status-stats {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 15px;
        }
        .stat-main {
            font-family: 'JetBrains Mono', monospace;
        }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); display: block; }
        .stat-val { font-size: 1.2rem; font-weight: bold; }
        .error-text { color: var(--accent-red); font-size: 0.85rem; }

        /* Biểu đồ mô phỏng */
        .graph-area {
            width: 100%;
            height: 100px;
            background: #000;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 1px solid #1c1f26;
        }
        #waveCanvas {
            width: 100%;
            height: 100%;
        }

        /* Warning text */
        .warning-box {
            font-size: 0.65rem;
            text-align: center;
            color: var(--text-muted);
            line-height: 1.4;
            margin: 15px 0;
            text-transform: uppercase;
        }
        .warning-box b { color: #f0f0f0; }

        /* Nút Start - Trái tim của giao diện */
        .btn-start {
            width: 100%;
            background: var(--accent-red);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 59, 48, 0.3);
            transition: transform 0.1s, filter 0.2s;
        }
        .btn-start:active { transform: scale(0.98); }
        .btn-stop { background: #333; box-shadow: none; display: none; }

        /* Footer */
        .results-mini {
            margin-top: 20px;
            font-size: 0.7rem;
            color: var(--text-muted);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="app-header">
        <div class="logo"><span>DDOS</span> MASTER</div>
    </div>

    <div class="section-header">🖥️ Config</div>
    <div class="config-card">
        <div class="input-group">
            <label>TARGET URL</label>
            <input type="text" id="targetUrl" class="input-field" value="https://httpbin.org/get">
        </div>

        <div class="input-group">
            <label>RPS (Requests Per Second) : <span id="rpsValDisplay" style="color:var(--text-main)">25,000</span></label>
            <input type="range" id="rps" min="100" max="100000" step="100" value="25000" oninput="document.getElementById('rpsValDisplay').innerText = Number(this.value).toLocaleString()">
        </div>

        <div class="input-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>DURATION</label>
                <select id="durationPreset" class="input-field">
                    <option value="60">1 MIN</option>
                    <option value="300">5 MIN</option>
                    <option value="900" selected>15 MIN</option>
                    <option value="3600">1 HOUR</option>
                </select>
            </div>
            <div>
                <label>METHOD</label>
                <select id="method" class="input-field">
                    <option>GET</option>
                    <option>POST</option>
                    <option>HEAD</option>
                </select>
            </div>
        </div>
        
        <div style="display:none">
            <input type="number" id="durationCustom">
            <input type="number" id="concurrency" value="500">
            <input type="text" id="payload" value="">
            <input type="text" id="proxy" value="">
            <input type="text" id="headers" value="">
        </div>
    </div>

    <div class="section-header"><span style="color:#4cd964">●</span> Live Status</div>
    <div class="status-card">
        <div class="status-stats">
            <div class="stat-main">
                <span class="stat-label">RPS</span>
                <span class="stat-val" id="liveRps">0</span>
            </div>
            <div style="text-align: right;">
                <div class="error-text">Error: <span id="liveErrorPercent">0.0%</span></div>
                <div class="stat-label" id="liveTimerDisplay">00:00 / 15:00</div>
            </div>
        </div>

        <div class="graph-area">
            <canvas id="waveCanvas"></canvas>
        </div>
    </div>

    <div class="warning-box">
        <b>Warning:</b> For authorized testing only.<br>Abuse is illegal.
    </div>

    <button id="startBtn" class="btn-start">Start Testing</button>
    <button id="stopBtn" class="btn-start btn-stop">Stop Attack</button>

    <div class="results-mini" id="resultsPanel">
        <div>OK: <span id="liveOk" style="color:var(--accent-cyan)">0</span></div>
        <div>ERR: <span id="liveErr" style="color:var(--accent-red)">0</span></div>
        <div>Avg Latency: <span id="avgLatency">0</span>ms</div>
        <div>Total: <span id="totalReq">0</span></div>
    </div>
</div>

<script>
    /* CORE LOGIC: Giữ nguyên các hàm xử lý của bạn nhưng mapping vào UI mới 
    */
    let activeTest = false;
    let stats = { ok: 0, err: 0, bytes: 0, latencies: [], startTime: 0, currentRps: 0 };
    let rpsInterval, timerInterval, waveInterval;

    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');

    // Vẽ biểu đồ sóng giả lập cho sinh động
    function drawWave() {
        if(!activeTest) { ctx.clearRect(0,0,canvas.width,canvas.height); return; }
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        
        ctx.beginPath();
        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 2;
        ctx.moveTo(0, canvas.height/2);
        
        for(let i=0; i<canvas.width; i+=5) {
            let y = (canvas.height/2) + Math.sin(i*0.05 + Date.now()*0.01) * (Math.random()*20);
            ctx.lineTo(i, y);
        }
        ctx.stroke();
    }

    function updateUI() {
        document.getElementById('liveOk').innerText = stats.ok.toLocaleString();
        document.getElementById('liveErr').innerText = stats.err.toLocaleString();
        document.getElementById('liveRps').innerText = stats.currentRps.toLocaleString();
        const total = stats.ok + stats.err;
        document.getElementById('totalReq').innerText = total.toLocaleString();
        document.getElementById('liveErrorPercent').innerText = total === 0 ? "0.0%" : (stats.err/total*100).toFixed(1) + "%";
        
        if(stats.latencies.length > 0) {
            const avg = stats.latencies.reduce((a,b)=>a+b,0) / stats.latencies.length;
            document.getElementById('avgLatency').innerText = Math.round(avg);
        }
    }

    async function runLoadTest() {
        const url = document.getElementById('targetUrl').value;
        const duration = parseInt(document.getElementById('durationPreset').value);
        const rpsTarget = parseInt(document.getElementById('rps').value);
        
        activeTest = true;
        stats.startTime = Date.now();
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';

        // Timer
        timerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - stats.startTime)/1000);
            const m = Math.floor(elapsed/60).toString().padStart(2,'0');
            const s = (elapsed%60).toString().padStart(2,'0');
            const totalM = Math.floor(duration/60).toString().padStart(2,'0');
            document.getElementById('liveTimerDisplay').innerText = `${m}:${s} / ${totalM}:00`;
            if(elapsed >= duration) stopTest();
        }, 1000);

        // Giả lập RPS (Thay bằng fetch loop thực tế của bạn tại đây)
        rpsInterval = setInterval(() => {
            if(!activeTest) return;
            // logic gửi request thật của bạn nên nằm ở đây
            let batch = Math.floor(rpsTarget / 10);
            stats.ok += batch;
            stats.currentRps = rpsTarget + Math.floor(Math.random()*500);
            stats.latencies.push(Math.random()*100 + 20);
            updateUI();
        }, 100);

        waveInterval = setInterval(drawWave, 50);
    }

    function stopTest() {
        activeTest = false;
        clearInterval(rpsInterval);
        clearInterval(timerInterval);
        clearInterval(waveInterval);
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'none';
    }

    document.getElementById('startBtn').onclick = runLoadTest;
    document.getElementById('stopBtn').onclick = stopTest;

    // Khởi tạo canvas
    function resizeCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.onresize = resizeCanvas;
    resizeCanvas();
</script>

</body>
</html>
